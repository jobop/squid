<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>squid docs</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 40px;
      line-height: 1.6;
      color: #1f2937;
      background: #ffffff;
    }
    .container { max-width: 860px; margin: 0 auto; }
    label, select { font-size: 14px; }
    h1 { margin-bottom: 8px; }
    .muted { color: #6b7280; }
  </style>
</head>
<body>
  <main class="container">
    <h1>squid documentation</h1>
    <p class="muted">Select a documentation locale. Missing localized pages fall back to English source docs.</p>
    <label for="locale">Language:</label>
    <select id="locale" aria-label="Language">
      <option value="en">English</option>
      <option value="zh">中文</option>
      <option value="ja">日本語</option>
      <option value="ru">Русский</option>
      <option value="it">Italiano</option>
      <option value="fr">Français</option>
      <option value="de">Deutsch</option>
    </select>
    <ul id="doc-links"></ul>
  </main>
  <script>
    const supported = ["en", "zh", "ja", "ru", "it", "fr", "de"];
    const defaultLocale = "en";
    const fallbackLocale = "en";
    const key = "squid.docs.locale";

    const pageMap = [
      { title: "Locale overview", path: (l) => `locales/${l}/index.md` },
      { title: "User guide (source)", path: () => "user-guide.md" },
      { title: "Developer guide (source)", path: () => "developer-guide.md" }
    ];

    const normalize = (value) => (supported.includes(value) ? value : defaultLocale);

    const searchLocale = new URLSearchParams(window.location.search).get("lang");
    const stored = window.localStorage.getItem(key);
    const selected = normalize(searchLocale || stored || defaultLocale);
    window.localStorage.setItem(key, selected);
    document.documentElement.lang = selected;

    const select = document.getElementById("locale");
    const links = document.getElementById("doc-links");
    select.value = selected;

    function render(locale) {
      links.innerHTML = "";
      for (const page of pageMap) {
        const li = document.createElement("li");
        const a = document.createElement("a");
        a.textContent = page.title;
        a.href = page.path(locale) || page.path(fallbackLocale);
        li.appendChild(a);
        links.appendChild(li);
      }
    }

    select.addEventListener("change", (event) => {
      const locale = normalize(event.target.value);
      window.localStorage.setItem(key, locale);
      document.documentElement.lang = locale;
      render(locale);
    });

    render(selected);
  </script>
</body>
</html>
