<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>squid</title>
  <link rel="icon" type="image/png" href="favicon.png" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1e1e1e;
      color: #e0e0e0;
    }

    #root {
      width: 100vw;
      height: 100vh;
    }

    .main-layout {
      display: flex;
      height: 100vh;
    }

    .sidebar {
      width: 200px;
      background: #252526;
      border-right: 1px solid #3e3e42;
      padding: 20px 0;
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .sidebar-nav a {
      padding: 10px 20px;
      color: #cccccc;
      text-decoration: none;
      transition: background 0.2s;
    }

    .sidebar-nav a:hover {
      background: #2a2d2e;
    }

    .content-area {
      flex: 1;
      display: flex;
      gap: 1px;
      background: #3e3e42;
    }

    .chat-panel, .result-panel {
      flex: 1;
      background: #1e1e1e;
      display: flex;
      flex-direction: column;
    }

    .chat-header, .result-header {
      padding: 15px 20px;
      background: #252526;
      border-bottom: 1px solid #3e3e42;
    }

    .chat-messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }

    .chat-input {
      padding: 15px 20px;
      background: #252526;
      border-top: 1px solid #3e3e42;
      display: flex;
      gap: 10px;
    }

    .chat-input textarea {
      flex: 1;
      padding: 10px;
      background: #1e1e1e;
      border: 1px solid #3e3e42;
      color: #e0e0e0;
      border-radius: 4px;
      resize: none;
      font-family: inherit;
    }

    .chat-input button {
      padding: 10px 20px;
      background: #0e639c;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .chat-input button:hover {
      background: #1177bb;
    }

    .result-tabs {
      display: flex;
      gap: 5px;
      padding: 10px 20px;
      background: #252526;
      border-bottom: 1px solid #3e3e42;
    }

    .result-tabs button {
      padding: 8px 16px;
      background: transparent;
      color: #cccccc;
      border: none;
      cursor: pointer;
      border-radius: 4px;
    }

    .result-tabs button:hover {
      background: #2a2d2e;
    }

    .result-content {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
    }
  </style>
</head>
<body>
  <div id="root">
    <div class="main-layout">
      <aside class="sidebar">
        <nav class="sidebar-nav">
          <a href="#tasks">Tasks</a>
          <a href="#skills">Skills</a>
          <a href="#experts">Experts</a>
          <a href="#claw">Remote Control</a>
          <a href="#scheduler">Scheduler</a>
          <a href="#settings">Settings</a>
        </nav>
      </aside>

      <main class="content-area">
        <section class="chat-panel">
          <div class="chat-header">
            <h2>Chat</h2>
          </div>
          <div class="chat-messages">
            <p style="color: #888;">Welcome to squid!</p>
          </div>
          <div class="chat-input">
            <textarea placeholder="Enter instruction..."></textarea>
            <button>Send</button>
          </div>
        </section>

        <section class="result-panel">
          <div class="result-header">
            <h2>Results</h2>
          </div>
          <div class="result-tabs">
            <button>Artifacts</button>
            <button>Files</button>
            <button>Changes</button>
            <button>Preview</button>
          </div>
          <div class="result-content">
            <p style="color: #888;">Execution results will appear here.</p>
          </div>
        </section>
      </main>
    </div>
  </div>
</body>
</html>
